<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>gym-log</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="train">训练</button>
    <button class="tab-btn" data-tab="exercises">动作库</button>
    <button class="tab-btn" data-tab="stats">统计</button>
  </nav>

  <main>
    <!-- 训练 -->
    <section id="tab-train" class="tab-panel active">
      <div class="card">
        <label>日期</label>
        <input type="date" id="train-date">
        <button id="btn-new-workout" class="btn primary">新建训练</button>
      </div>

      <div id="workout-area" class="hidden">
        <div class="card">
          <label>分类</label>
          <select id="sel-category"><option value="">请选择</option></select>
          <label>动作</label>
          <select id="sel-exercise"><option value="">请先选择分类</option></select>

          <div id="warmup-area" class="hidden">
            <div class="warmup-title">热身组</div>
            <div id="warmup-fields" class="row"></div>
          </div>

          <div class="normal-title">常规组</div>
          <div id="normal-fields" class="row"></div>
          <div class="btn-row">
            <button id="btn-toggle-warmup" class="btn secondary">热身组</button>
            <button id="btn-add-set" class="btn primary">添加组</button>
          </div>
        </div>

        <div class="card">
          <h3>当日记录</h3>
          <div id="set-list"></div>
        </div>
      </div>

      <div class="card">
        <h3>历史训练</h3>
        <div id="workout-list"></div>
      </div>
    </section>

    <!-- 动作库 -->
    <section id="tab-exercises" class="tab-panel">
      <div class="card">
        <label>动作名称</label>
        <input type="text" id="ex-name" placeholder="例如：卧推">
        <label>分类</label>
        <input type="text" id="ex-category" placeholder="例如：胸部">
        <label>字段配置</label>
        <div id="ex-fields-wrap" style="display:flex;flex-direction:column;gap:8px;margin:8px 0;">
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            <label style="display:flex;align-items:center;gap:4px;font-weight:normal;margin:0;cursor:pointer;"><input type="checkbox" value="weight" checked> 重量</label>
            <label style="display:flex;align-items:center;gap:4px;font-weight:normal;margin:0;cursor:pointer;"><input type="checkbox" value="reps" checked> 次数</label>
            <label style="display:flex;align-items:center;gap:4px;font-weight:normal;margin:0;cursor:pointer;"><input type="checkbox" value="sets" checked> 组数</label>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;">
            <label style="display:flex;align-items:center;gap:4px;font-weight:normal;margin:0;cursor:pointer;"><input type="checkbox" value="duration"> 时长</label>
            <label style="display:flex;align-items:center;gap:4px;font-weight:normal;margin:0;cursor:pointer;"><input type="checkbox" value="speed"> 速度</label>
            <label style="display:flex;align-items:center;gap:4px;font-weight:normal;margin:0;cursor:pointer;"><input type="checkbox" value="incline"> 坡度</label>
            <label style="display:flex;align-items:center;gap:4px;font-weight:normal;margin:0;cursor:pointer;"><input type="checkbox" value="resistance"> 阻尼</label>
            <label style="display:flex;align-items:center;gap:4px;font-weight:normal;margin:0;cursor:pointer;"><input type="checkbox" value="distance"> 距离</label>
          </div>
        </div>
        <button id="btn-add-ex" class="btn primary">添加动作</button>
      </div>
      <div class="card">
        <h3>动作列表</h3>
        <div id="ex-list"></div>
      </div>
    </section>

    <!-- 统计 -->
    <section id="tab-stats" class="tab-panel">
      <div class="card">
        <label>分类</label>
        <select id="stat-category"><option value="">请选择</option></select>
        <label>动作</label>
        <select id="stat-exercise"><option value="">请先选择分类</option></select>
        <button id="btn-load-pr" class="btn primary">查看趋势</button>
        <div class="chart-wrap">
          <canvas id="pr-chart"></canvas>
        </div>
      </div>
      <div class="card">
        <h3>训练量</h3>
        <div class="row">
          <div class="field">
            <label>开始</label>
            <input type="date" id="stat-start">
          </div>
          <div class="field">
            <label>结束</label>
            <input type="date" id="stat-end">
          </div>
        </div>
        <button id="btn-load-vol" class="btn primary">查看训练量</button>
        <p class="vol-hint">纵坐标单位：kg×次。训练量 = Σ(重量 × 次数)，按天汇总。</p>
        <div class="chart-wrap">
          <canvas id="vol-chart"></canvas>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>
  <script src="/static/js/app.js"></script>
</body>
</html>
