<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录 - gym-log</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 24px;
      width: 100%;
      max-width: 360px;
    }
    .login-card h2 {
      text-align: center;
      margin-bottom: 24px;
      color: var(--accent);
    }
    .login-card .btn {
      width: 100%;
      margin-top: 20px;
    }
    .login-hint {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h2>gym-log</h2>
      <label>用户名</label>
      <input type="text" id="username" placeholder="输入用户名" autocomplete="username">
      <label>密码</label>
      <input type="password" id="password" placeholder="输入密码" autocomplete="current-password">
      <button id="btn-login" class="btn primary">登录</button>
      <p class="login-hint">账号由管理员分配，不开放自由注册</p>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <script>
    function $(s) { return document.querySelector(s); }
    function toast(msg) {
      const t = $('#toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    $('#btn-login').addEventListener('click', async () => {
      const username = $('#username').value.trim();
      const password = $('#password').value;
      if (!username || !password) return toast('请填写用户名和密码');

      try {
        const res = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include'
        });
        if (!res.ok) {
          const data = await res.json();
          throw new Error(data.error || '登录失败');
        }
        window.location.href = '/';
      } catch (e) {
        toast(e.message);
      }
    });

    $('#password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('#btn-login').click();
    });
  </script>
</body>
</html>
